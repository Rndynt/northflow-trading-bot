[mode]
run_mode = "research"
dry_run = true

[pairs]
symbols = ["BTCUSDT"]
entry_timeframe = "1m"
screening_timeframe = "15m"
confirmation_timeframe = "5m"

[historical_files]
BTCUSDT = [
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2020.csv",
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2021.csv",
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2022.csv",
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2023.csv",
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2024.csv",
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2025.csv",
]

[strategy]
strategy_id = "screened_vwap_scalp_v2"
min_confidence = 90
v2_require_strict_confirmation = true
v2_require_ema_ribbon_alignment = true
v2_allow_neutral_confirmation = false
v2_min_expected_reward_bps = 24.0
v2_min_expected_net_edge_bps = 10.0
v2_min_atr_bps = 12.0
v2_max_atr_bps = 90.0
v2_tp_atr_multiple = 1.8
v2_sl_atr_multiple = 1.0
v2_min_volume_ratio = 1.40
v2_vwap_distance_atr_min = 0.0
v2_vwap_distance_atr_max = 0.45
v2_cooldown_bars = 12
v2_enable_long = true
v2_enable_short = true

[risk]
initial_equity_usd = 5000.0
risk_per_trade_pct = 0.15
max_open_positions = 1
max_leverage = 3.0
min_reward_risk = 1.3
max_daily_loss_pct = 3.0
max_drawdown_pct = 100.0

[cost]
taker_fee_bps = 4.0
slippage_bps = 2.0
spread_bps = 1.0
market_impact_bps = 1.0
stop_slippage_bps = 5.0

[backtest]
data_dir = "data/historical"
reports_dir = "reports/svs2_btc_entry1m_momentum_quality_2020_2025"
conservative_intrabar = true
max_bars_held = 18
entry_geometry_mode = "reanchor_to_actual_entry"
entry_lookback_bars = 120
strategy_run_mode = "single"
strategies = ["screened_vwap_scalp_v2"]