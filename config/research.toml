[mode]
run_mode = "research"
dry_run = true

[pairs]
symbols = ["BTCUSDT"]
entry_timeframe = "1m"
screening_timeframe = "15m"
confirmation_timeframe = "5m"

[strategy]
strategy_id = "screened_vwap_scalp_v2"
min_confidence = 65

# V2 filters — only used when strategy_id = "screened_vwap_scalp_v2"
v2_require_strict_confirmation = true
v2_require_ema_ribbon_alignment = true
v2_allow_neutral_confirmation = false
v2_min_expected_reward_bps = 25.0
v2_min_expected_net_edge_bps = 10.0
v2_min_atr_bps = 8.0
v2_max_atr_bps = 120.0
v2_tp_atr_multiple = 2.5
v2_sl_atr_multiple = 1.0
v2_min_volume_ratio = 1.0
v2_vwap_distance_atr_min = 0.0
v2_vwap_distance_atr_max = 1.5
v2_cooldown_bars = 5
v2_enable_long = true
v2_enable_short = true

[risk]
initial_equity_usd = 5000.0
risk_per_trade_pct = 0.25
max_open_positions = 1
max_leverage = 3.0
min_reward_risk = 1.5
max_daily_loss_pct = 5.0
max_drawdown_pct = 100.0

[cost]
taker_fee_bps = 4.0
slippage_bps = 2.0
spread_bps = 1.0
market_impact_bps = 1.0
stop_slippage_bps = 5.0

[backtest]
data_dir = "data/historical"
reports_dir = "reports/comparison"
conservative_intrabar = true
max_bars_held = 60
entry_geometry_mode = "reanchor_to_actual_entry"
entry_lookback_bars = 0

# Strategy runner — controls how many strategies are backtested per run.
#
# single     — run exactly one strategy (default, preserves legacy behavior)
# comparison — run multiple strategies independently, each with its own equity,
#              risk state, and report subfolder
# multi      — reserved for future shared-account portfolio mode; currently
#              returns a config error if used
#

# Single Mode
# strategy_run_mode = "single"
# strategies = ["screened_vwap_scalp_v2"]

# EMA Trend Pullback V1 — only used when strategy_id = "ema_trend_pullback_v1"
etp_require_strict_screening_trend = true
etp_require_strict_confirmation_trend = true
etp_require_entry_ema_alignment = true
etp_allow_long = true
etp_allow_short = true
etp_pullback_to = "ema21_or_vwap"
etp_max_pullback_distance_atr = 1.25
etp_min_pullback_distance_atr = 0.0
etp_reclaim_mode = "close_reclaim"
etp_min_body_ratio = 0.30
etp_min_wick_rejection_ratio = 0.20
etp_sl_atr_multiple = 1.0
etp_tp_atr_multiple = 3.0
etp_min_reward_risk = 2.5
etp_min_atr_bps = 10.0
etp_max_atr_bps = 180.0
etp_min_expected_reward_bps = 30.0
etp_min_expected_net_edge_bps = 12.0
etp_min_volume_ratio = 1.0
etp_cooldown_bars = 10

# Comparison mode
strategy_run_mode = "comparison"
strategies = ["screened_vwap_scalp", "screened_vwap_scalp_v2", "ema_trend_pullback_v1"]

# To compare strategies, uncomment and switch to comparison mode:
# strategy_run_mode = "comparison"
# strategies = ["screened_vwap_scalp", "screened_vwap_scalp_v2"]
# reports_dir = "reports/comparison"

