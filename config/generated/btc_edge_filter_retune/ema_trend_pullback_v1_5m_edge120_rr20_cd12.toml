[mode]
run_mode = "research"
dry_run = true

[pairs]
symbols = ["BTCUSDT"]
entry_timeframe = "5m"
screening_timeframe = "1h"
confirmation_timeframe = "15m"

[historical_files]
BTCUSDT = [
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2020.csv",
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2021.csv",
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2022.csv",
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2023.csv",
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2024.csv",
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2025.csv",
]

[strategy]
strategy_id = "ema_trend_pullback_v1"
min_confidence = 75

v2_require_strict_confirmation = true
v2_require_ema_ribbon_alignment = true
v2_allow_neutral_confirmation = false
v2_min_expected_reward_bps = 120.0
v2_min_expected_net_edge_bps = 80.0
v2_min_atr_bps = 8.0
v2_max_atr_bps = 250.0
v2_tp_atr_multiple = 2.2
v2_sl_atr_multiple = 1.0
v2_min_volume_ratio = 1.2
v2_vwap_distance_atr_min = 0.8
v2_vwap_distance_atr_max = 3.5
v2_cooldown_bars = 12
v2_enable_long = true
v2_enable_short = true

etp_require_strict_screening_trend = true
etp_require_strict_confirmation_trend = true
etp_require_entry_ema_alignment = true
etp_allow_long = true
etp_allow_short = true
etp_pullback_to = "ema21_or_vwap"
etp_max_pullback_distance_atr = 1.25
etp_min_pullback_distance_atr = 0.10
etp_reclaim_mode = "close_reclaim"
etp_min_body_ratio = 0.30
etp_min_wick_rejection_ratio = 0.20
etp_sl_atr_multiple = 1.0
etp_tp_atr_multiple = 2.2
etp_min_reward_risk = 2.0
etp_min_atr_bps = 8.0
etp_max_atr_bps = 250.0
etp_min_expected_reward_bps = 120.0
etp_min_expected_net_edge_bps = 80.0
etp_min_volume_ratio = 1.2
etp_cooldown_bars = 12

[risk]
initial_equity_usd = 5000.0
risk_per_trade_pct = 0.15
max_open_positions = 1
min_reward_risk = 2.0
max_daily_loss_pct = 3.0
max_drawdown_pct = 100.0

[cost]
taker_fee_bps = 5.0
slippage_bps = 0.0
spread_bps = 0.0
market_impact_bps = 0.0
stop_slippage_bps = 0.0

[backtest]
data_dir = "data/historical"
reports_dir = "reports/btc_edge_filter_retune/ema_trend_pullback_v1_5m_edge120_rr20_cd12"
conservative_intrabar = true
max_bars_held = 36
entry_geometry_mode = "reanchor_to_actual_entry"
entry_lookback_bars = 160
strategy_run_mode = "single"
strategies = ["ema_trend_pullback_v1"]
