[mode]
run_mode = "research"
dry_run = true

[pairs]
symbols = ["BTCUSDT"]
entry_timeframe = "1m"
screening_timeframe = "15m"
confirmation_timeframe = "5m"

[strategy]
strategy_id = "ema_trend_pullback_v1"
min_confidence = 75

# EMA Trend Pullback V1 — stricter VWAP-only hypothesis test.
# Purpose: reduce overtrading and only keep higher-quality VWAP reclaim signals.
etp_require_strict_15m_trend = true
etp_require_strict_5m_confirmation = true
etp_require_1m_ema_alignment = true
etp_allow_long = true
etp_allow_short = true
etp_pullback_to = "vwap"
etp_max_pullback_distance_atr = 0.75
etp_min_pullback_distance_atr = 0.0
etp_reclaim_mode = "close_reclaim_or_wick"
etp_min_body_ratio = 0.35
etp_min_wick_rejection_ratio = 0.25
etp_sl_atr_multiple = 1.0
etp_tp_atr_multiple = 3.5
etp_min_reward_risk = 3.0
etp_min_atr_bps = 12.0
etp_max_atr_bps = 160.0
etp_min_expected_reward_bps = 50.0
etp_min_expected_net_edge_bps = 25.0
etp_min_volume_ratio = 1.1
etp_cooldown_bars = 30

# V2 fields retained with defaults so the naive config parser remains stable.
v2_require_strict_confirmation = true
v2_require_ema_ribbon_alignment = true
v2_allow_neutral_confirmation = false
v2_min_expected_reward_bps = 25.0
v2_min_expected_net_edge_bps = 10.0
v2_min_atr_bps = 8.0
v2_max_atr_bps = 120.0
v2_tp_atr_multiple = 2.5
v2_sl_atr_multiple = 1.0
v2_min_volume_ratio = 1.0
v2_vwap_distance_atr_min = 0.0
v2_vwap_distance_atr_max = 1.5
v2_cooldown_bars = 5
v2_enable_long = true
v2_enable_short = true

[risk]
initial_equity_usd = 5000.0
risk_per_trade_pct = 0.25
max_open_positions = 1
max_leverage = 3.0
min_reward_risk = 1.5
max_daily_loss_pct = 5.0
max_drawdown_pct = 100.0

[cost]
taker_fee_bps = 4.0
slippage_bps = 2.0
spread_bps = 1.0
market_impact_bps = 1.0
stop_slippage_bps = 5.0

[backtest]
data_dir = "data/historical"
reports_dir = "reports/etp_vwap_strict"
conservative_intrabar = true
max_bars_held = 60
entry_geometry_mode = "reanchor_to_actual_entry"
entry_lookback_bars = 0
strategy_run_mode = "single"
strategies = ["ema_trend_pullback_v1"]
