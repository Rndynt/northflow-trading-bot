[mode]
run_mode = "research"
dry_run = true

[pairs]
symbols = ["BTCUSDT"]
entry_timeframe = "1m"
screening_timeframe = "15m"
confirmation_timeframe = "5m"

[historical_files]
BTCUSDT = [
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2020.csv",
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2021.csv",
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2022.csv",
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2023.csv",
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2024.csv",
  "data/historical/BTCUSDT/1m/BTCUSDT-1m-2025.csv",
]

[strategy]
strategy_id = "vwap_reclaim_short_v2"
min_confidence = 70
vrs2_lookback_bars = 50
vrs2_breakout_window_bars = 8
vrs2_retest_tolerance_atr = 0.50
vrs2_max_extension_atr = 1.50
vrs2_min_volume_ratio = 0.80
vrs2_min_atr_bps = 14.0
vrs2_max_atr_bps = 21.0
vrs2_min_reward_risk = 2.0
vrs2_min_expected_reward_bps = 25.0
vrs2_min_expected_net_edge_bps = 30.0
vrs2_cooldown_bars = 0
vrs2_max_anchor_range_atr = 20.0
vrs2_min_breakdown_close_atr = 0.02
vrs2_max_breakdown_close_atr = 3.00
vrs2_require_breakdown_volume_expansion = false
vrs2_min_breakdown_volume_ratio = 0.80
vrs2_stop_mode = "structure"
vrs2_sl_atr_multiple = 1.2
vrs2_tp_atr_multiple = 2.8
vrs2_structure_stop_buffer_atr = 0.05
vrs2_max_structure_stop_atr = 2.2
vrs2_require_current_bearish_body = false
vrs2_min_current_body_ratio = 0.0
vrs2_min_upper_wick_rejection_ratio = 0.0

[backtest]
data_dir = "data/historical"
reports_dir = "reports/vwap_reclaim_short_v2_probe_edge30_50_2020_2025"
conservative_intrabar = true
max_bars_held = 60
entry_geometry_mode = "reanchor_to_actual_entry"
entry_lookback_bars = 80
strategy_run_mode = "single"
strategies = ["vwap_reclaim_short_v2"]